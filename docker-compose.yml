version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - RETRIEVER_TYPE=hybrid
      - CHROMA_PERSIST_DIR=/data/chroma_db
      - UPLOAD_DIR=/data/uploads
    volumes:
      - doc_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  doc_data:
